 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Page</title>
</head>
<body>
    
    <div class="container">
        <h1>Welcome to My Page</h1>
        <p>Please Register to continue</p>
        <form id="registrationForm">
            <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <br>
            <label class="error-message" id="usernameError" style="color: red; display: none;"></label><br><br>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <br>
                <label class="error-message" id="emailError" style="color: red; display: none;"></label><br><br>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                <br>
                <label class="error-message" id="passwordError" style="color: red; display: none;"></label><br><br>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password:</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
                <br>
                <label class="error-message" id="confirmPasswordError" style="color: red; display: none;"></label><br><br>
            </div>
            <button type="submit">Register</button>
        </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
</body>
</html>
